services:
  postgres:
    # pgvector required for RAG knowledge index (build_knowledge_index.py)
    image: pgvector/pgvector:pg16
    container_name: cxone_zendesk_postgres
    environment:
      POSTGRES_USER: orchestration
      POSTGRES_PASSWORD: orchestration
      POSTGRES_DB: orchestration
    ports:
      # Host 5433 avoids conflict with a local PostgreSQL install on 5432 (common on Windows).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestration -d orchestration"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
